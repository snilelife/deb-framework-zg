name: ZGPookingOverlayKit
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "13.0"
settings:
  base:
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_ENABLE_CPP_EXCEPTIONS: "NO"
    GCC_ENABLE_CPP_RTTI: "NO"
    IPHONEOS_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: ZGPookingOverlayKit
    SWIFT_VERSION: "5.0"
targets:
  ZGPookingOverlayKit:
    type: framework
    platform: iOS
    sources:
      # IMPORTANT: list exact implementation files instead of `path: src`.
      # This prevents Codemagic/XcodeGen from compiling old duplicate files such as
      # src/ZGPredictionEngine.cpp together with src/ZGPookingEngine.cpp.
      - path: src/ZGPookingOverlayController.mm
      - path: src/ZGPookingEngine.cpp
      - path: src/ZGPookingFrameScanner.cpp
      - path: bridges/ZGPookingOverlayExports.mm
      - path: include
        headerVisibility: public
    dependencies:
      - sdk: Foundation.framework
      - sdk: UIKit.framework
      - sdk: CoreGraphics.framework
      - sdk: QuartzCore.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zg.pookingoverlaykit
        DEFINES_MODULE: "YES"
        MACH_O_TYPE: mh_dylib
        SKIP_INSTALL: "NO"
        BUILD_LIBRARY_FOR_DISTRIBUTION: "YES"
        OTHER_LDFLAGS: "$(inherited) -framework Foundation -framework UIKit -framework CoreGraphics -framework QuartzCore"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @loader_path/Frameworks"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        DEVELOPMENT_TEAM: ""
    info:
      path: generated/Info.plist
      properties:
        CFBundleDisplayName: ZGPookingOverlayKit
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
schemes:
  ZGPookingOverlayKit:
    build:
      targets:
        ZGPookingOverlayKit: all
