workflows:
  build-ios-overlay-packages:
    name: Build ZGPredictionOverlay dylib/framework packages
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          set -e
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Build framework
        script: |
          set -euo pipefail
          chmod +x scripts/build_ios_framework.sh
          scripts/build_ios_framework.sh
      - name: Build auto-start dylib
        script: |
          set -euo pipefail
          chmod +x scripts/build_ios_dylib.sh
          scripts/build_ios_dylib.sh
      - name: Package zip artifacts
        script: |
          set -euo pipefail
          chmod +x scripts/package_artifacts.sh
          scripts/package_artifacts.sh
      - name: Optional deb package
        script: |
          set -euo pipefail
          if [ -n "${ZG_TARGET_BUNDLE_ID:-}" ]; then
            brew install dpkg || true
            chmod +x scripts/package_deb.sh
            scripts/package_deb.sh "$ZG_TARGET_BUNDLE_ID"
          else
            echo "Skipping .deb. Set ZG_TARGET_BUNDLE_ID to build one."
          fi
          ls -lh artifacts
    artifacts:
      - artifacts/*.zip
      - artifacts/*.deb
      - build/Release-iphoneos/ZGPredictionOverlay.dylib
      - build/Build/Products/Release-iphoneos/ZGPredictionOverlay.framework
      - build/Build/Products/Release-iphoneos/ZGPredictionOverlayKit.framework
